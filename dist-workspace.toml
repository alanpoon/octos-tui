[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "npm", "homebrew"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Publish the npm package under the @octos-org scope -> `npm i -g @octos-org/octos-tui`
npm-scope = "@octos-org"
# Homebrew formula is pushed to this tap -> `brew install octos-org/tap/octos-tui`
tap = "octos-org/homebrew-tap"
# Ship the self-updater + install receipt so `octos-tui update` can self-update
# in-place (and defer to brew/npm when installed that way).
install-updater = true
# Push the generated formula to the Homebrew tap on release.
publish-jobs = ["homebrew"]
# Only dry-run ("plan") on PRs; full release artifacts run on tag pushes.
pr-run-mode = "plan"
